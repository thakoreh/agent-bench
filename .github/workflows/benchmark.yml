name: Agent Benchmark

on:
  pull_request:
    branches: [main, master]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent-bench
        run: |
          pip install -e ".[dev]"

      - name: Detect installed agents
        id: detect
        run: |
          echo "agents=$(agent-bench agents 2>&1 | grep -c '✅' || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Run benchmark
        id: bench
        run: |
          # Use PR diff as the task description
          TASK="Review and improve the code changes in this PR"
          
          # Try to run benchmark; JSON output for parsing
          agent-bench run --task "$TASK" --json > benchmark_results.json 2>&1 || true
          
          # Generate markdown report
          agent-bench results --markdown > benchmark_report.md 2>&1 || true
          
          # Generate HTML report
          agent-bench report --html -o benchmark_report.html 2>&1 || true

      - name: Post benchmark results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let body = '## 🏁 Agent Benchmark Results\n\n';
            
            try {
              const markdown = fs.readFileSync('benchmark_report.md', 'utf8');
              body += markdown;
            } catch (e) {
              body += '> Benchmark did not produce results. No agents may be installed in CI.\n';
            }
            
            body += '\n\n---\n*Generated by [agent-bench](https://github.com/hiren-thakore/agent-bench) on PR #${{ github.event.pull_request.number }}*';
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark_report.html
          if-no-files-found: ignore
