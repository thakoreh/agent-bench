name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install radon

      - name: Run tests and capture output
        run: |
          python -m pytest tests/ -v --tb=long > ci_test_output.txt 2>&1 || true

      - name: Push test output
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@bot.com"
          git add ci_test_output.txt
          git commit -m "ci: test output" || true
          git push origin master || true

      - name: Run tests (real)
        run: python -m pytest tests/ -v --tb=long

      - name: Check type hints
        run: |
          pip install mypy
          python -m mypy agent_bench/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
