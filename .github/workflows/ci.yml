name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install radon

      - name: Run tests per file
        run: |
          rm -f ci_results.txt
          PASS=0
          FAIL=0
          for f in tests/test_scorer.py tests/test_extended.py tests/test_edge_cases.py tests/test_new_scoring.py tests/test_web_radar.py tests/test_v5_features.py tests/test_v4_features.py tests/test_model_comparison.py tests/test_nightshift_improvements.py; do
            if [ -f "$f" ]; then
              OUT=$(python -m pytest "$f" -v --tb=long 2>&1) || true
              if echo "$OUT" | tail -1 | grep -q "passed"; then
                PASS=$((PASS+1))
                echo "PASS: $f" >> ci_results.txt
              else
                FAIL=$((FAIL+1))
                echo "FAIL: $f" >> ci_results.txt
                echo "$OUT" >> ci_results.txt
              fi
            fi
          done
          echo "--- SUMMARY: $PASS passed, $FAIL failed ---" >> ci_results.txt

      - name: Push results
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@bot.com"
          git add ci_results.txt
          git commit -m "ci: per-file test results" || true
          git push origin master || true

      - name: Run all tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check type hints
        run: |
          pip install mypy
          python -m mypy agent_bench/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
