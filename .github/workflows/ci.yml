name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install radon

      - name: Verify imports
        run: |
          python -c "import agent_bench; print('agent_bench OK')"
          python -c "import agent_bench.scorer; print('scorer OK')"
          python -c "import agent_bench.reporter; print('reporter OK')"
          python -c "import agent_bench.web_reporter; print('web_reporter OK')"
          python -c "import agent_bench.collector; print('collector OK')"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check agent_bench/ tests/ --ignore=E501
        continue-on-error: true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/pytest_output.txt
          echo "## Pytest Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pytest_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check type hints
        run: |
          pip install mypy
          python -m mypy agent_bench/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
