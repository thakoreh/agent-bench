name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install radon

      - name: Run tests and create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pytest tests/ -v --tb=long > /tmp/out.txt 2>&1; true
          BODY=$(head -200 /tmp/out.txt)
          gh issue create --title "CI 3.11 Debug $(date +%s)" --body "$BODY" || echo "FAILED TO CREATE ISSUE"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check type hints
        run: |
          pip install mypy
          python -m mypy agent_bench/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
