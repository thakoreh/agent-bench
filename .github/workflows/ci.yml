name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install radon

      - name: Import check
        run: |
          python -c "from agent_bench import scorer; print('OK')" 2>&1 >> $GITHUB_STEP_SUMMARY || true
          python -c "from agent_bench import collector; print('OK')" 2>&1 >> $GITHUB_STEP_SUMMARY || true
          python -c "from agent_bench import reporter; print('OK')" 2>&1 >> $GITHUB_STEP_SUMMARY || true
          python -c "from agent_bench import web_reporter; print('OK')" 2>&1 >> $GITHUB_STEP_SUMMARY || true
          python -c "from agent_bench import cli; print('OK')" 2>&1 >> $GITHUB_STEP_SUMMARY || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/out.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/out.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check type hints
        run: |
          pip install mypy
          python -m mypy agent_bench/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
